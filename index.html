<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dashboard</title>
  <meta name="description" content="A calm, personal daily dashboard." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111315" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dashboard" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
  <link rel="icon" href="assets/icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/themes.css?v=22" />
  <link rel="stylesheet" href="css/styles.css?v=22" />
  <link rel="stylesheet" href="css/mobile.css?v=22" />
</head>
<body>
  <div class="app-shell">
    <!-- ============================== MAIN ============================== -->
    <main class="main-scroll">
      <!-- Header (photo-style hero) -->
      <header class="header hero">
        <div class="hero-scrim"></div>

        <div class="hero-actions">
          <button class="icon-btn hero-icon-btn" id="themeToggleBtn" aria-label="Toggle dark mode">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeToggleIconSun" class="theme-icon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeToggleIconMoon" class="theme-icon" style="display:none;"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
          </button>
          <button class="icon-btn hero-icon-btn" id="refreshBtn" aria-label="Refresh">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-refresh"><path d="M3 12a9 9 0 0 1 15.5-6.36M21 12a9 9 0 0 1-15.5 6.36"/><path d="M3 4v6h6M21 20v-6h-6"/></svg>
          </button>
          <button class="icon-btn hero-icon-btn" id="menuBtn" aria-label="More">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
          </button>
        </div>

        <div class="hero-titles">
          <div class="hero-eyebrow" id="greetingEyebrow">Good Afternoon</div>
          <h1 class="hero-name">Gene</h1>
          <p class="hero-date" id="greetingDate">Tuesday, July 14, 2026</p>
        </div>

        <div class="hero-weather" id="heroWeather">
          <!-- populated by app.js -->
        </div>
      </header>

      <!-- Day of week banner -->
      <div class="day-banner" id="dayBanner">
        <!-- populated by app.js -->
      </div>

      <!-- Quick Summary -->
      <section aria-label="Quick summary" class="card quick-summary-card">
        <div class="section-label" style="margin-bottom:16px;">Quick summary</div>
        <div class="quick-summary" id="quickSummary">
          <!-- populated by app.js -->
        </div>
      </section>

      <!-- Today (100%) -->
      <section>
        <article class="card card--tappable card--today" data-card="today">
          <div class="card-header">
            <h2 class="card-title accent-calendar">
              <svg class="card-title-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
              Today
            </h2>
          </div>

          <div class="today-block">
            <div class="row-label-line">
              <span class="today-block-label">Next appointment</span>
            </div>
            <div id="nextEventRow"></div>
          </div>

          <div class="today-block">
            <div class="today-block-label" id="remindersLabel">Reminders</div>
            <div id="remindersList"></div>
          </div>

          <div class="today-block">
            <div class="today-block-label" id="birthdaysLabel">Birthdays &amp; anniversaries (next 3 days)</div>
            <div id="birthdaysTodayList"></div>
          </div>

          <button class="card-footer-link accent-calendar" id="birthdaysExpandBtn">
            View all birthdays &amp; anniversaries
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>

          <div class="card-footer-row">
            <span></span>
            <div class="card-footer-refresh">
              <span id="todayUpdatedAt">--</span>
              <button class="icon-btn icon-btn--small" id="todayRefreshBtn" aria-label="Refresh calendar and reminders">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-refresh"><path d="M3 12a9 9 0 0 1 15.5-6.36M21 12a9 9 0 0 1-15.5 6.36"/><path d="M3 4v6h6M21 20v-6h-6"/></svg>
              </button>
            </div>
          </div>
        </article>
      </section>

      <!-- Oura readiness (100%) -->
      <section>
        <article class="card card--tappable card--oura" data-card="oura">
          <div class="card-header">
            <h2 class="card-title accent-health">
              <svg class="card-title-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
              Oura readiness
            </h2>
          </div>

          <div class="oura-rings-grid" id="ouraRingsGrid"></div>

          <div class="card-footer-row">
            <button class="card-footer-link accent-health" data-card-link="oura">
              View trends
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <div class="card-footer-refresh">
              <span id="ouraUpdatedAt">--</span>
              <button class="icon-btn icon-btn--small" id="ouraRefreshBtn" aria-label="Refresh readiness data">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-refresh"><path d="M3 12a9 9 0 0 1 15.5-6.36M21 12a9 9 0 0 1-15.5 6.36"/><path d="M3 4v6h6M21 20v-6h-6"/></svg>
              </button>
            </div>
          </div>
        </article>
      </section>

      <!-- Weather (50%) + Markets (50%) -->
      <section class="half-row">
        <article class="card card--tappable card--weather" data-card="weather">
          <div class="card-header">
            <h2 class="card-title accent-weather">
              <svg class="card-title-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.4 1.8A4 4 0 0 0 6.5 19h11z"/></svg>
              Weather
            </h2>
          </div>
          <div class="weather-rows" id="weatherColumns"></div>
          <div class="card-footer-row">
            <button class="card-footer-link accent-weather" data-card-link="weather">
              View full forecast
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <div class="card-footer-refresh">
              <span id="weatherUpdatedAt">--</span>
              <button class="icon-btn icon-btn--small" id="weatherRefreshBtn" aria-label="Refresh weather">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-refresh"><path d="M3 12a9 9 0 0 1 15.5-6.36M21 12a9 9 0 0 1-15.5 6.36"/><path d="M3 4v6h6M21 20v-6h-6"/></svg>
              </button>
            </div>
          </div>
        </article>

        <article class="card card--tappable card--markets" data-card="markets">
          <div class="card-header">
            <h2 class="card-title accent-markets">
              <svg class="card-title-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8M21 7v6h-6"/></svg>
              Market update
            </h2>
            <span class="market-open-pill" id="marketOpenPill">Market Open</span>
          </div>
          <div class="markets-list" id="marketsIndices"></div>
          <div class="portfolio-card" id="portfolioGrid"></div>
          <div class="card-footer-row">
            <button class="card-footer-link accent-markets" data-card-link="markets">
              View market details
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
            </button>
            <div class="card-footer-refresh">
              <span id="marketsUpdatedAt">--</span>
              <button class="icon-btn icon-btn--small" id="marketsRefreshBtn" aria-label="Refresh market data">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-refresh"><path d="M3 12a9 9 0 0 1 15.5-6.36M21 12a9 9 0 0 1-15.5 6.36"/><path d="M3 4v6h6M21 20v-6h-6"/></svg>
              </button>
            </div>
          </div>
        </article>
      </section>

      <!-- Upcoming Trips (100%) -->
      <section>
        <article class="card card--trips" data-card="trips">
          <div class="card-header">
            <h2 class="card-title accent-travel">
              <svg class="card-title-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 19.5l19-7.5-19-7.5 2 6.5 8 1-8 1z"/></svg>
              Upcoming trips
            </h2>
          </div>
          <div class="trips-list" id="tripsList"></div>
        </article>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-pill">Last updated: <span id="footerUpdated">--</span> · <span>Dashboard v2</span></div>
      </footer>
    </main>
  </div>

  <!-- Expansion sheet -->
  <div class="sheet-scrim" id="sheetScrim"></div>
  <aside class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-header">
      <h3 class="sheet-title" id="sheetTitle">Details</h3>
      <button class="sheet-close" id="sheetCloseBtn" aria-label="Close">✕</button>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </aside>

  <script type="module" src="js/app.js?v=22"></script>
</body>
</html>
